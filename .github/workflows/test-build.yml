name: Test Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test_build_wheels:
    name: Test build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]  # Start with just Ubuntu for faster testing
        python-version: ['3.9']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest numpy pybind11
          python -c "import pybind11; print('pybind11 include path:', pybind11.get_include())"
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libarmadillo-dev

      - name: Build package
        run: |
          python -m build
        env:
          VERBOSE: 1

      - name: Test built package
        run: |
          pip install dist/*.whl
          cd ..  # Move out of the source directory to test the installed package
          python -c "import tlars; print(tlars.__version__)"

  test_build_sdist:
    name: Test build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest numpy pybind11
          python -c "import pybind11; print('pybind11 include path:', pybind11.get_include())"
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libarmadillo-dev

      - name: Build sdist
        run: |
          python -m build --sdist
        env:
          VERBOSE: 1

      - name: Test built sdist
        run: |
          pip install dist/*.tar.gz
          cd ..  # Move out of the source directory to test the installed package
          python -c "import tlars; print(tlars.__version__)" 