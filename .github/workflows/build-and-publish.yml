name: Build and Publish

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libarmadillo-dev
          python -m pip install --upgrade pip
          python -m pip install pybind11 numpy

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install eigen armadillo
          python -m pip install --upgrade pip
          python -m pip install pybind11 numpy

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # For Windows, we'll use vcpkg to install Eigen and Armadillo
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          ./vcpkg install eigen3:x64-windows
          ./vcpkg install armadillo:x64-windows
          ./vcpkg integrate install
          echo "VCPKG_ROOT=$PWD" >> $GITHUB_ENV
          python -m pip install --upgrade pip
          python -m pip install pybind11 numpy

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BEFORE_BUILD_LINUX: "pip install numpy pybind11 && yum install -y eigen3-devel armadillo-devel || apt-get update && apt-get install -y libeigen3-dev libarmadillo-dev"
          CIBW_BEFORE_BUILD_MACOS: "pip install numpy pybind11 && brew install eigen armadillo"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install numpy pybind11 && if not exist C:\\vcpkg\\installed\\x64-windows\\include\\eigen3 (git clone https://github.com/Microsoft/vcpkg.git C:\\vcpkg && C:\\vcpkg\\bootstrap-vcpkg.bat && C:\\vcpkg\\vcpkg install eigen3:x64-windows && C:\\vcpkg\\vcpkg install armadillo:x64-windows && C:\\vcpkg\\vcpkg integrate install)"
          CIBW_ENVIRONMENT_WINDOWS: "EIGEN_INCLUDE_DIR=C:\\vcpkg\\installed\\x64-windows\\include\\eigen3 ARMADILLO_INCLUDE_DIR=C:\\vcpkg\\installed\\x64-windows\\include"
          CIBW_ENVIRONMENT_LINUX: "EIGEN_INCLUDE_DIR=/usr/include/eigen3 ARMADILLO_INCLUDE_DIR=/usr/include"
          CIBW_ENVIRONMENT_MACOS: "EIGEN_INCLUDE_DIR=/usr/local/include/eigen3 ARMADILLO_INCLUDE_DIR=/usr/local/include"
          CIBW_SKIP: "pp* cp36-* cp37-* *-musllinux*"  # Skip PyPy and older Python versions
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tlars/tests"
          CIBW_BUILD_VERBOSITY: 3  # Increase verbosity for debugging
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pybind11 numpy
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libarmadillo-dev

      - name: Build sdist
        run: |
          python -m build --sdist

      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v3
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: wheels
          path: dist

      - uses: actions/download-artifact@v3
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }} 